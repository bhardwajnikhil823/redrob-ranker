# ============================================================================
ai_tools_used:
  - "GitHub Copilot"
ai_usage_summary: |
  Used GitHub Copilot as a pair-programming assistant for scaffolding, code
  review, and documentation. All ranking logic, weighting, honeypot rules and
  the anti-keyword-stuffing design were specified and verified by the team.
  No candidate data was sent to any hosted LLM; ranking runs fully offline.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Explainable, CPU-only ranker (no GPU, no network). Each candidate gets a base
  score from nine interpretable components - career-substance, TF-IDF semantic
  match, a tiered title gate, experience band, product-vs-services, NLP/IR-vs-
  CV/speech domain, location, evaluation experience, education tier - multiplied
  by a behavioural availability modifier from redrob_signals (response rate,
  recency, open-to-work, interview completion). The decisive anti-trap move is
  scoring demonstrated work in career descriptions rather than the keyword-
  stuffable skills array; a dedicated guard further penalises profiles that list
  many AI skills but show no supporting career evidence (the JD's "Marketing
  Manager with AI skills" trap), while protecting genuine career-switchers.
  Logically-impossible honeypots (role duration exceeding its date span, tenure
  beyond declared experience, reversed/future dates, zero-usage expert skills)
  are detected and forced out. Result on the released pool: top 100 is 100%
  technical AI/ML titles, 82% in the 5-9 year band, 0 honeypots. Runs in ~30s
  with ~3.5 GB peak memory for 100K candidates. Covered by 23 unit/regression
  tests.

