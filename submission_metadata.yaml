# ============================================================================
# AI tools declaration  (transparency only — declared use is NOT penalised)
# ============================================================================
ai_tools_used:
  - "GitHub Copilot"        # TODO adjust to what you actually used
ai_usage_summary: |
  Used GitHub Copilot as a pair-programming assistant for scaffolding, code
  review, and documentation. All ranking logic, weighting, honeypot rules and
  the anti-keyword-stuffing design were specified and verified by the team.
  No candidate data was sent to any hosted LLM; ranking runs fully offline.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Explainable CPU-only ranker. A base score (nine interpretable components:
  career-substance, TF-IDF semantic match, tiered title gate, experience band,
  product-vs-services, NLP/IR-vs-CV/speech domain, location, evaluation
  experience, education tier) is multiplied by a behavioural availability
  modifier from redrob_signals (response rate, recency, open-to-work, interview
  completion). The decisive anti-stuffer move is scoring demonstrated work in
  career descriptions rather than the skills array. Logically-impossible
  honeypots are detected and forced out (0 in the top 100). Runs in ~30s for
  100K candidates with no GPU and no network.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true          # explicit honeypot detection + verification
  reproduction_tested: true
